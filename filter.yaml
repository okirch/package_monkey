preferences:
 - over:
    - "*-32bit"
    - "*-32bit-*"
 - prefer: typelib-1_0-Gtk-4_0
   over:
    - typelib-1_0-Gtk-3_0
    - typelib-1_0-Gtk-2_0
 - prefer: kernel-default
   over: kernel-default-base
 - prefer: libopenssl-3-devel
   over: libopenssl-1_1-devel
 - prefer: icewm-lite
   over: icewm-default
 - prefer: java-17-openjdk-headless
   over: java-11-openjdk-headless
 - prefer: java-17-openjdk
   over: java-11-openjdk
 - prefer: java-17-openjdk
   over: java-1_8_0-ibm
 - prefer: cracklib-dict-small
   over: cracklib-dict-full
 - prefer: chrony-pool-suse
   over: chrony-pool-empty
 - prefer: libjpeg8-devel
   over: libjpeg62-devel
 - prefer: dbus-1
   over: dbus-1-x11
 - prefer: iputils
   over: wicked
 - prefer: shadow
   over: busybox
 - prefer: cracklib-dict-small
   over: cracklib-dict-full
 - prefer: ocaml-compiler-libs-devel
   over: ocaml-compiler-libs
 - prefer: cross-nvptx-newlib12-devel
   over: 
    - cross-nvptx-newlib7-devel
    - cross-nvptx-newlib11-devel
 - prefer: mvapich2-psm2
   over: mvapich2-psm
 - prefer: mvapich2-psm
   over:
    - mpich
    - mpich-ofi
# libOpenIPMI0 and OpenIPMI
# icu.691-devel and libicu-devel

groups:
 - name: "@32bit"
   priority: 0
   packages:
    - "*-32bit"
    - "*-32bit-*"

 - name: "@DevelPackages"
   priority: 1
   packages:
    - "*-devel"
    - "*-devel-static"
    - "*-devel-extra"
    - rpm-build

 - name: "@Development"
   packages:
    - gcc*
    - binutils
    - bison
    - cmake
    - make
    - flex
    - autoconf
    - automake
    - autogen
    - imake

 - name: "@Documentation"
   rpmGroups:
    - Documentation/*
   packages:
    - release-notes-*

 - name: "@Databases"
   rpmGroups:
    - Productivity/Databases*
   packages:
    - postgresql*
    - unixODBC
    - rsyslog-module-mysql
    - rsyslog-module-pgsql
    - libmariadb3

 - name: "@Graphics"
   rpmGroups:
    - Productivity/Graphics/*

 - name: "@Multimedia"
   rpmGroups:
    - Productivity/Multimedia/*

 - name: "@X11"
   rpmGroups:
    - System/X11/*
   packages:
    - cairo*
    - Mesa*
    - mkfontdir
    - mkfontscale
    - setxkbmap
    - wayland*
    - xauth
    - xbitmaps
    - xcb-*
    - xconsole
    - xdg-menu
    - xdg-utils
    - xdm
    - xdmbgrd
    - xdpyinfo
    - xf86*
    - xhost
    - xineramaproto
    - xinit
    - xkbcomp
    - xkeyboard-config
    - xmessage
    - xmodmap
    - xorg-*
    - xprop
    - xproto
    - xrandr
    - xrdb
    - xrdp
    - xrefresh
    - xscreensaver
    - xset
    - xsetroot
    - xterm
    - xtermset

 - name: "@Gnome"
   packages:
    - gsettings-*
    - gtk*
    - at-spi2*
    - glib2
    - glib2-branding-SLE
    - gnome-*
    - typelib-*
    - dbus-1-glib-tool*
    - dbus-1-glib
    - polkit-gnome*

 - name: "@CryptoLibraries"
   explicitClosure:
    - "@Core"
    - "@CoreLibraries"
   binaries:
    - openssl
    - openssl-1_1
    - mozilla-nss
    - p11-kit-nss-trust
    - crypto-policies
    - libgobject-*
    - libtasn1

 - name: "@CoreLibraries"
   explicitClosure:
    - "@Core"
   binaries:
    - perl
    - perl-base
   packages:
    - cracklib
    - cracklib-dict-small
    - glibc
    - libaudit1
    - libcom_err2
    - libcrack2
    - libcurl4
    - libdevmapper*
    - libext2fs2
    - libfl2
    - libgcc_s1
    - libglib-*
    - libgpgme11
    - libldap-*
    - libnl3-200
    - libnl-config
    - libopenssl1_1
    - libpci3
    - libreiserfscore0
    - libsasl2-*
    - libssh4
    - libssh-config
    - libstdc++6
    - libsqlite3*

#   - libgio-*

