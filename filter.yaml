 - name: "@Glibc"
   buildconfig: Core/standard
   # when deciding where to place -devel packages for a set of packages spread across
   # several labels (eg glibc here, nscd in Core0), we want this label to win
   gravity: 100
   binaries:
    - glibc
    - glibc-locale
    - libcrypt1
    - filesystem
    - system-user-root
   purposes:
    - name: devel
      requires:
       - "@Core0"
      binaries:
       - linux-glibc-devel
       - glibc-devel
       - pkgconf
       - pkgconf-m4
       - pkgconf-pkg-config

 - name: "@MinimalCDevelopment"
   description: |
     This defines the set of packages that have to be present in order
     to install the average -devel package.
   buildconfig: Core/standard
   requires:
    - "@GCC"
    # some -devel packages require info when installed; usually through gettext but sometimes directly
    - "@Texinfo"
    - "@Glibc-devel"
    - "@Core0"
   packages:
    # llvm15 requires libtool
    - libtool
    - automake
    - autoconf
    - autoconf-archive
    - autogen
    # libssh-devel requires cmake
    - cmake
#   - cmake-mini
    - make
    - gettext-runtime-mini
    - gettext-tools-mini
    - gettext-runtime
    - gettext-tools

