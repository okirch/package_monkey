templates:
 - name: PythonGroups
   substitute: XXX
   document:
    - name: "@PythonXXX"
      # buildconfig: Python/pythonXXX
      sourceproject: Python
      compatibility: pythonXXX
      requires:
       - "@PythonCoreXXX"

    - name: "@PythonStandardXXX"
      # buildconfig: Python/pythonXXX
      sourceproject: Python
      compatibility: pythonXXX
      note: |
       We need to carefully avoid polluting the dependencies of this group
       with anything that pulls in SystemPython or anything of that sort.
      requires:
       - "@PythonXXX"
       - "@Core0"
       - "@Glib2NoDBus"
       - "@PythonData"
       - "@TclCore"
       - "@CoreNetworkLibraries"
       - "@NumericLibraries"
      binaries:
       - pythonXXX-alabaster
       - pythonXXX-apipkg
       - pythonXXX-attrs
       - pythonXXX-Babel
       - pythonXXX-bcrypt
       - pythonXXX-beniget
       - pythonXXX-certifi
       - pythonXXX-cffi
       - pythonXXX-charset-normalizer
       - pythonXXX-cryptography
       - pythonXXX-cssselect
   #   - pythonXXX-curses
       - pythonXXX-decorator
       - pythonXXX-docopt
       - pythonXXX-docutils
       - pythonXXX-flit-core
       - pythonXXX-future
       - pythonXXX-gast
       - pythonXXX-gobject
       - pythonXXX-idna
       - pythonXXX-imagesize
       - pythonXXX-iniconfig
       - pythonXXX-Jinja2
       - pythonXXX-langtable
       - pythonXXX-lxml
       - pythonXXX-MarkupSafe
       - pythonXXX-packaging
       - pythonXXX-pexpect
       - pythonXXX-ply
       - pythonXXX-py
       - pythonXXX-pycparser
       - pythonXXX-pycurl
       - pythonXXX-Pygments
       - pythonXXX-pyparsing
       - pythonXXX-pyOpenSSL
       - pythonXXX-python-dateutil
       - pythonXXX-pytz
       - pythonXXX-PyYAML
       - pythonXXX-requests
       - pythonXXX-snowballstemmer
       - pythonXXX-slip
       - pythonXXX-sphinx*
       - pythonXXX-Sphinx
       - pythonXXX-tomli
       - pythonXXX-tomli-w
       - pythonXXX-tqdm
       - pythonXXX-urllib3
       - pythonXXX-numpy
       - pythonXXX-zope
       - pythonXXX-zope.*
      buildflavors:
       - name: x11
         requires:
          - "@X11StandardUtils"
          # hatch wants git-core:
          - "@Core1"
         binaries:
          - pythonXXX-pyperclip
          - pythonXXX-hatch
       - name: dbus
         requires:
          - "@DBus"
         binaries:
          - pythonXXX-dbus-python
          - pythonXXX-notify2
          - pythonXXX-slip-dbus
       - name: tcl
         requires:
          - "@TclCore+x11"
         binaries:
          - pythonXXX-Pympler
       - name: graphics
         # this could also go to a new base label "PythonGraphicsXXX"
         augments:
          - "@Glib2+python"
          - "@GraphicsLibraries+x11"
          - "@FontLibraries+x11"
          - "@PythonCoreXXX+tcl"
          - "@TclCore+x11"
         binaries:
          - pythonXXX-pycairo
          - pythonXXX-cairocffi
          - pythonXXX-CairoSVG
          - pythonXXX-Pillow
          - pythonXXX-Pillow-tk
          - pythonXXX-Django
          - pythonXXX-pytest-django
       - name: desktop
         augments:
          - "@Glib2+python"
          - "@GnomeLibraries"
          - "@DesktopLibraries"
          - "@PythonStandardXXX+graphics"
          - "@PythonStandardXXX+dbus"
         binaries:
          - pythonXXX-Send2Trash
          - pythonXXX-gobject-*
          - pythonXXX-pyxdg
          - pythonXXX-atspi
       - name: database
         requires:
          - "@Databases"
       - name: tex
         requires:
          - "@Texlive"
         binaries:
          - pythonXXX-Sphinx-latex
       - name: numeric
         requires:
          - "@NumericLibraries"
          - "@CorePlusAPI"
          - "@BoostAPI"
          - PythonAPIXXX
         binaries:
          - pythonXXX-pythran
          - pythonXXX-numpy-devel

    - name: "@PythonModulesXXX"
      # buildconfig: Python/pythonXXX
      sourceproject: Python
      compatibility: pythonXXX
      requires:
       - "@PythonStandardXXX"

    - name: "@PythonMatplotXXX"
      # buildconfig: Python/pythonXXX
      sourceproject: Python
      compatibility: pythonXXX
      requires:
       - "@PythonModulesXXX"
       - "@PythonStandardXXX+graphics"
       - "@TclCore+x11"
      binaries:
       - pythonXXX-matplotlib
       - pythonXXX-matplotlib-tk
      buildflavors:
       - name: qt
         requires:
          - "@Qt"
         binaries:
          - pythonXXX-matplotlib-qt*
       - name: gnome
         requires:
          - "@Gnome"
          - "@PythonStandardXXX+desktop"
         binaries:
          - pythonXXX-matplotlib-gtk*
       - name: tex
         requires:
          - "@Texlive"
         binaries:
          - pythonXXX-matplotlib-latex
       - name: wxwidgets
         requires:
          - "@WxWidgets"
         binaries:
          - pythonXXX-matplotlib-wx


    - name: "@CythonXXX"
      # buildconfig: Python/pythonXXX
      sourceproject: Python
      compatibility: pythonXXX
      requires:
       - "PythonAPIXXX"
       - "@PythonCoreXXX"
      binaries:
       - pythonXXX-Cython
       - pythonXXX-Cython3

