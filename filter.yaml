    - "@Core0"
    - "@Core1"
   packages:
   buildflavors:
    - name: glib
      requires:
       - "@SystemdLibraries"
       - "@X11Libraries"
      binaries:
    - name: networkServices
      requires:
       - "@NetworkServices"
       - "@HostStorage"
       - "@Core+systemdlibs"
       - "@Core+udevlibs"
      binaries:
       - cyrus-sasl-*
       - e2fsprogs-scrub
       - openssh-server
       - openssh
    - name: postgres
      requires:
       - "@Databases"
       - "@Core+networkServices"
      binaries:
       - cyrus-sasl-sqlauxprop*
       - cyrus-sasl-sqlauthd*
    - name: python
      buildrequires:
       - "@Python"
      requires:
       - "@PythonCore"
       - "@Core+systemdlibs"
       - "@Core+udevlibs"
      binaries:
       - python-btrfsutil
       - sudo-plugin-python
    - name: zypp
      requires:
       - "@UpdateStack"
       - "@UpdateStack+python"
       - "@Core+systemd"
      binaries:
       - snapper-zypp-plugin
       - permissions-zypp-plugin
    - name: java
      buildrequires:
       - "@Java"
      binaries:
       - pam-doc
    - name: kernellibs
