# vi: ai et
autoflavors:
 - name: perl
   # If Foo requires @PerlCore, then merge all packages that would be
   # labelled Foo+perl into Foo itself. Otherwise, behave like
   # disposition "separate"
   disposition: maybe_merge
   requires:
    - "@PerlCore"
   packages:
    - perl-*
 - name: python
   disposition: maybe_merge
   # placing packages through this autoflavor can be overridden by
   # explicit placement in some @Topic (which has a default priority of 5)
   priority: 10
   requires:
    - "@PythonStandard"
   packages:
    - python3-*
    - python39-*
    - python310-*
    - python311-*
#- name: hpcbuild
#  description: |
#    This auto flavor exists primarily to help merging all *-gnu-hpc-*
#    builds of various packages into @HPC
#  disposition: maybe_merge
#  requires:
#   - "@HPC"
#  packages:
#   - "*-gnu-hpc-*"
 - name: ruby
   requires:
    - "@Ruby"
   packages:
    - ruby-*
#- name: ocaml
#  disposition: maybe_merge
#  requires:
#   - "@Ocaml"
#  packages:
#   - ocaml-*
 - name: typelib
   # we want typelib packages to be merged into the package group of
   # the library they apply to, rather than into a new +typelib flavor
   disposition: maybe_merge
   # typelibs usually depend on the package they refer to, plus girepository
   # which currently lives in Glib2
   requires:
    - "@Glib2"
   packages:
    - typelib-*
 - name: accounts
   disposition: maybe_merge
   priority: 9
   autoselect: no
   # these shouldn't really end up in a different multibuild flavor
   packages:
    - system-user-*

purposes:
 - name: devel
   description: |
    This matches all -devel packages, inluding static libraries.
    For the time being, we also include architecture variants because
    we have devel packages that happily mix 64bit and 32bit packages
    (python-pycairo-common-devel for instance).
   # make sure that packages that end with *-devel are
   # recognized by this filter with a higher priority than
   # any prefix match.
   priority: 4
   packages:
    - "*-devel"
    - "*-devel-static"
    - "*-devel-extra"
    - "*-devel-doc"
    - "*-devel-32bit"
    - "*-devel-static-32bit"
    - "*-devel-x86-64-v3"
    - "*-devel-static-x86-64-v3"
 - name: doc
   priority: 4
   autoselect: no
   packages:
    - "*-doc"
    - "*-doc-html"
    - "*-doc-pdf"
    - "*-docs"
    - "*-docs-html"
    - "*-docs-pdf"
    - "*-docs-common"
    - "*-javadoc"
    - "*-manual"
    - "*-examples"
 - name: i18n
   priority: 4
   autoselect: no
   packages:
    - "*-lang"
 - name: man
   priority: 4
   autoselect: no
   augments:
    - "@ManDoc"
   packages:
    - "*-man"
    - "*-manpages"
 - name: x86_64_v3
   priority: 4
   autoselect: no
   packages:
    - "*-x86-64-v3"
 - name: 32bit
   priority: 0
   packages:
    - "*-32bit"
    - "*-32bit-*"

