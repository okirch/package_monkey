templates:
 - name: PythonGroups
   substitute: XXX
   document:
    - name: "@PythonXXX"
      buildconfig: Python/pythonXXX
      requires:
       - "@PythonCoreXXX"

    - name: "@PythonStandardXXX"
      buildconfig: Python/pythonXXX
      requires:
       - "@PythonXXX"
       - "@Core0"
       - "@Glib2"
       - "@PythonData"
       - "@TclCore"
       - "@NumericLibraries"
#      - "@SystemdUtilities"
      binaries:
       - pythonXXX-alabaster
       - pythonXXX-apipkg
       - pythonXXX-Babel
       - pythonXXX-certifi
       - pythonXXX-cffi
       - pythonXXX-charset-normalizer
       - pythonXXX-cryptography
       - pythonXXX-cssselect
   #   - pythonXXX-curses
       - pythonXXX-dbus-python
       - pythonXXX-decorator
       - pythonXXX-docopt
       - pythonXXX-docutils
       - pythonXXX-flit-core
       - pythonXXX-future
       - pythonXXX-gobject
       - pythonXXX-idna
       - pythonXXX-imagesize
       - pythonXXX-iniconfig
       - pythonXXX-Jinja2
       - pythonXXX-langtable
       - pythonXXX-lxml
       - pythonXXX-MarkupSafe
       - pythonXXX-notify2
       - pythonXXX-packaging
       - pythonXXX-pexpect
       - pythonXXX-py
       - pythonXXX-pycparser
       - pythonXXX-pycurl
       - pythonXXX-Pygments
       - pythonXXX-pyparsing
       - pythonXXX-pyperclip
       - pythonXXX-pyOpenSSL
       - pythonXXX-python-dateutil
       - pythonXXX-pytz
       - pythonXXX-PyYAML
       - pythonXXX-requests
       - pythonXXX-slip-dbus
       - pythonXXX-snowballstemmer
       - pythonXXX-sphinx*
       - pythonXXX-Sphinx
       - pythonXXX-urllib3
       - pythonXXX-numpy
       - pythonXXX-zope
       - pythonXXX-zope.*
      buildflavors:
       - name: x11
         requires:
          - "@X11StandardUtils"
         binaries:
       - name: graphics
         # this could also go to a new base label "PythonGraphicsXXX"
         augments:
          - "@Glib2+python"
          - "@GraphicsLibraries+x11"
          - "@FontLibraries+x11"
         binaries:
          - pythonXXX-pycairo
          - pythonXXX-cairocffi
          - pythonXXX-CairoSVG
         purposes:
#         - name: devel
#           requires:
#            # python-pycairo-common-devel requires cairo-devel which depends on various xlibs
#            - "@X11Libraries"
       - name: desktop
         augments:
          - "@Glib2+python"
          - "@GnomeLibraries"
          - "@DesktopLibraries"
          - "@PythonStandardXXX+graphics"
         binaries:
          - pythonXXX-Send2Trash
          - pythonXXX-gobject-*
          - pythonXXX-pyxdg
          - pythonXXX-atspi
       - name: database
         requires:
          - "@Databases"
       - name: tex
         requires:
          - "@Texlive"
         binaries:
          - pythonXXX-Sphinx-latex
       - name: numeric
         requires:
          - "@NumericLibraries"
          - "@CorePlusAPI"
         binaries:
          - pythonXXX-pythran
          - pythonXXX-numpy-devel

    - name: "@PythonModulesXXX"
      buildconfig: Python/pythonXXX
      requires:
       - "@PythonStandardXXX"

    - name: "@PythonMatplotXXX"
      buildconfig: Python/pythonXXX
      requires:
       - "@PythonModulesXXX"
       - "@PythonStandardXXX+graphics"
      binaries:
       - pythonXXX-matplotlib
       - pythonXXX-matplotlib-tk
      buildflavors:
       - name: qt
         requires:
          - "@Qt+python"
         binaries:
          - pythonXXX-matplotlib-qt*
       - name: gnome
         requires:
          - "@Gnome"
          - "@PythonStandardXXX+desktop"
         binaries:
          - pythonXXX-matplotlib-gtk*
       - name: tex
         requires:
          - "@Texlive"
         binaries:
          - pythonXXX-matplotlib-latex
       - name: wxwidgets
         requires:
          - "@WxWidgets"
         binaries:
          - pythonXXX-matplotlib-wx


    - name: "@CythonXXX"
      buildconfig: Python/pythonXXX
      requires:
       - "CoreDevel"
       - "@PythonCore"
      binaries:
       - pythonXXX-Cython
       - pythonXXX-Cython3

