 - name: "@BootBuild"
   buildconfig: KernelPlus/standard
   requires:
    - "@Core"
    - "@FontLibraries"
   packages:
    - plymouth

 - name: "@Stuff"
   buildconfig: Network/standard
   requires:
    - "@Core"
   rpmGroups:
    - Productivity/Scientific/*
   packages:
    - rrdtool

 - name: "@Management"
   buildconfig: Management/standard
   requires:
    - "@Core"
    - "@Python"
    - "@MinimalManagement"
    - "@UpdateStack"
   packages:
    - cmpi-provider-register
    - cim-schema
    - salt
    - sca-*
    - sblim-*
    - augeas*
    - ruby*-rubygem-cfa*
    - ruby*-rubygem-ruby-augeas
    - freeipmi
    # salt and python-salt require each other, so we have to place it here
    - python3*-salt

 - name: "@Texlive"
   buildconfig: Texlive/standard
   priority: 3
   requires:
    - "@Core"
    - "@PerlCore"
    - "@Fonts"
    - "@FontLibraries"
    - "@DrawingLibraries"
   packages:
    - texlive-*
    - perl-biber

 - name: "@Patterns"
   description: |
     patterns packages should live outside the component framework.
   disposition: ignore
   buildconfig: Core/standard
   packages:
    - patterns-*

