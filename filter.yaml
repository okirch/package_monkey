preferences:
 - over:
    - "*-32bit"
    - "*-32bit-*"
 - prefer: grub2-x86_64-efi
   over: grub2-i386-efi
 - prefer: typelib-1_0-Gtk-4_0
   over:
    - typelib-1_0-Gtk-3_0
    - typelib-1_0-Gtk-2_0
 - prefer: kernel-default
   over: kernel-default-base
 - prefer: libopenssl-3-devel
   over: libopenssl-1_1-devel
 - prefer: icewm-lite
   over: icewm-default
 - prefer: java-17-openjdk-headless
   over: java-11-openjdk-headless
 - prefer: java-17-openjdk
   over: java-11-openjdk
 - prefer: java-17-openjdk
   over: java-1_8_0-ibm
 - prefer: cracklib-dict-small
   over: cracklib-dict-full
 - prefer: chrony-pool-suse
   over: chrony-pool-empty
 - prefer: libjpeg8-devel
   over: libjpeg62-devel
 - prefer: dbus-1
   over: dbus-1-x11
 - prefer: iputils
   over: wicked
 - prefer: shadow
   over: busybox
 - prefer: cracklib-dict-small
   over: cracklib-dict-full
 - prefer: ocaml-compiler-libs-devel
   over: ocaml-compiler-libs
 - prefer: cross-nvptx-newlib12-devel
   over: 
    - cross-nvptx-newlib7-devel
    - cross-nvptx-newlib11-devel
 - prefer: mvapich2-psm2
   over: mvapich2-psm
 - prefer: mvapich2-psm
   over:
    - mpich
    - mpich-ofi
# libOpenIPMI0 and OpenIPMI
# icu.691-devel and libicu-devel

build_groups:
 - name: "Core"
   buildrequires:
    - BaseBuildEnv
   requires:
    - "@Core"
    - "@CoreLibraries"
    - "@CryptoLibraries"
    - "@Perl/Core"
 - name: "KernelPlus"
   buildrequires:
    - "Core"
   requires:
    - "@Kernel"
    - "@Boot"
 - name: "PerlCore"
   buildrequires:
    - "Core"
   requires:
    - "@Perl/Core_NONONONO"
 - name: Databases
   buildrequires:
    - "Core"
   requires: 
    - "@Databases"
 - name: BaseBuildEnv
   requires:
    - "@GCC"
 - name: Systemd
   requires:
    - "@MinimalSystemd"
 - name: Python
   requires:
    - "@Python"
 - name: Apache
   requires:
    - "@Apache"
 - name: X11
   requires:
    - "@X11Libraries"
    - "@X11"

groups:
 - name: "@32bit"
   priority: 0
   packages:
    - "*-32bit"
    - "*-32bit-*"

 - name: "@DevelPackages"
   priority: 1
   packages:
    - "*-devel"
    - "*-devel-static"
    - "*-devel-extra"
