groups:
 - name: "@GccRuntime"
   sourceproject: GCC
   requires:
    - "@Glibc"
   binaries:
    - libgcc_s1
    - libstdc++6
    - libgomp1
    - libgfortran5
    - libatomic1
    - libquadmath0
    - libubsan1
    - libgmp10
    - libgmpxx4

 - name: "@GCC"
   sourceproject: GCC
   requires:
    - "@GlibcDevel"
    - "@MinimalCRuntime"
    - "@Core0"
   binaries:
    - gcc
    - cpp
    - gcc13
    - cpp13
    - binutils
    - ccache
    - debugedit
    - gmp
    - dwz
    - isl
    - gmp-devel
    - libstdc++-devel
    - libstdc++6-devel-gcc13

 - name: "@GCCDevel"
   sourceproject: GCC
   requires:
    - "@GCC"
    - "@CoreAPI"
   binaries:
    - binutils-devel

 - name: "@GccCross"
   sourceproject: GCC
   requires:
    - "@GCC"
    - "@LLVM"
   binaries:
    - cross-*
    - cross-*-newlib13-devel

 - name: GccDevel
   sourceproject: GCC
   requires:
    - "@GCC"
    - "@LLVM"
   binaries:
    - gcc13-devel
    - cross-amdgcn-gcc13
    - cross-nvptx-gcc13

 - name: "@LLVMRuntime"
   sourceproject: LLVM
   requires:
    - "@CoreLibraries"
   binaries:
    - libLLVM1?
    - libLTO1?
    - libomp1?
    - libclang1?
    - libclang1?-cpp*
    - libc++1
    - libc++abi1

 - name: "@LLVM"
   sourceproject: LLVM
   requires:
    - "@MinimalCRuntime"
    - "@Core0"
    - "@SystemPython"
    - "@LLVMRuntime"
   binaries:
    - llvm
    - clang
    - llvm1?
    - llvm1?-polly
    - lldb
#   - liblldb1?

 - name: WorkbenchDevel
   requires:
    - "@Ocaml"
   binaries:

 - name: "@Testing"
   sourceproject: Workbench
   requires:
    - "@MinimalCRuntime"
    - "@Core0"

 - name: "@BaseDevTools"
   sourceproject: Workbench
   requires:
    - "@WorkbenchCore"
    - "@PythonStandard"
    - "@Texinfo" # for info
   binaries:
    - bison
    - net-tools-deprecated
    - datefudge
    - gnu-efi
    # do these really belong here?
    - cscope
    - ctags
    - unifdef
    - cppunit

 - name: "@Ocaml"
   sourceproject: Workbench
   requires:
    - "@Core0"
    - "@CoreAPI"
   binaries:
    - ocaml
    # unfortunately, ocaml-runtime requires ocaml, so we need to lump these all together into one topic
    - ocaml-runtime
    - ocaml-rpm-macros
    - ocaml-*
    - ocaml-ocamldoc           purpose=devel
    - ocaml-dune               purpose=devel
    - ocaml-dune-devel         purpose=devel
   buildflavors:
    - name: x11
      requires:
       - "@X11Libraries"
      binaries:
       - ocaml-graphics

 - name: "@CoreConfig"
   sourceproject: Core

 - name: "@Glibc"
#  api: "@GlibcDevel"
   sourceproject: Core
   gravity: 100
   binaries:
    - glibc
    - glibc-locale
    - libcrypt1
    - filesystem
    - compat-usrmerge-tools
    - system-user-root

 # This label exists because we need to hide the fact that somewhat oddly,
 # Glibc sits below gcc runtime
 - name: "@MinimalCRuntime"
   sourceproject: Core
   requires:
    - "@Glibc"
    - "@GccRuntime"

 - name: "@GlibcDevel"
   sourceproject: Core
   requires:
    - "@Core0"
   binaries:
    - glibc-devel
    - libxcrypt-devel
    - linux-glibc-devel
    - libpkgconf3
    - pkgconf
    - pkgconf-m4
    - pkgconf-pkg-config
    - cross-*-glibc-devel priority=3

 - name: "@WorkbenchRuntime"
   sourceproject: Workbench
   requires:
    - "@MinimalCRuntime"
   binaries:
    - libltdl7
    - gettext-runtime-mini

 - name: CoreDevel
   requires:
    - "@GlibcDevel"
    - "@Glib2API"
    - "@CoreAPI"
    - "@SystemdAPI"
   binaries:
    - rpm-build
    - compat-usrmerge-build
#   - libbz2-devel
    - libelf-devel
    - libbsd-devel
#   - libxml2-devel
    - fftw3-devel priority=0
    # misnamed package (should have been static-devel)
    - newt-static
    - libgpgme-devel priority=0

 - name: "@BoostAPI"
   sourceproject: CorePlus
   requires:
    - "@Boost"
    - "@CoreAPI"
    - "@I18nAPI"
   packages:
    - boost-defaults
   binaries:
    - boost-devel
    - libboost_headers-devel
    - libboost_headers1*-devel priority=0
    - libboost_atomic-devel
    - libboost_chrono-devel
    - libboost_container-devel
    - libboost_context-devel
    - libboost_contract-devel
    - libboost_coroutine-devel
    - libboost_date_time-devel
    - libboost_fiber-devel
    - libboost_filesystem-devel
    - libboost_graph-devel
    - libboost_iostreams-devel
    - libboost_locale-devel
    - libboost_log-devel
    - libboost_math-devel
    - libboost_nowide-devel
    - libboost_program_options-devel
    - libboost_random-devel
    - libboost_regex-devel
    - libboost_serialization-devel
    - libboost_stacktrace-devel
    - libboost_system-devel
    - libboost_test-devel
    - libboost_thread-devel
    - libboost_timer-devel
    - libboost_type_erasure-devel
    - libboost_wave-devel
    - boost-jam
   buildflavors:
    - name: python
      binaries:
#      - python3-boost_parallel_mpi

 - name: "@Boost"
   api: "@BoostAPI"
   sourceproject: CorePlus
   description: |
     Standard build of boost. 
     Currently, this has to live in Core because it's required by snapper.
     However, if we move snapper to CorePlus, we could probably move Boost
     as well
   requires:
    - "@PlusLibraries"
   packages:
    - boost:base
    - boost-defaults
   binaries: 
    # place one libboost rpm here explicitly. There's still something wrong with the
    # label hierarchy, because if I don't do this, the libboost_* packages from
    # boost:base will not be placed at all.
    # This seems to be an issue with boost-license1 being required by something that
    # doesn't have @Boost in its list of requirements
    - libboost_thread1_82_0

 - name: "@FFTW3"
   sourceproject: Core
   description: |
     Standard build of the fftw3 library.  Could possibly live in CorePlus just as well.
     The only problem with this placement right now is that this also buils fftw3-mpi-devel,
     which depends on openmpi4-devel from HPC (for whatever reasons).
   requires:
    - "@CoreLibraries"
   packages:
    - fftw3:standard
   binaries:
#   - fftw3-mpi-devel hide

 - name: "@CoreAPI"
   sourceproject: Core
   description: |
     This label exists to maintain a cycle-free dependency graph for
     devel packages. Some packages in CoreDevel depend on glib2-devel,
     which lives in @Glib2API. glib2-devel in turn requires some packages
     from CoreDevel - so we move these into @CoreAPI to straighten
     things out.
   requires:
    - "@MinimalCDevelopment"
    - "@GlibcDevel"
    - "@GCC"
   binaries:
    - flex
    - freetype2-devel
    - gdbm-devel
    - libatomic_ops-devel
    - libblkid-devel
    - libbrotli-devel
    - libbz2-devel
    - libcurl-devel
    - libexpat-devel
    - libffi-devel
    - libidn2-devel
    - libjson-c-devel
    - libmount-devel
    - libopenssl-devel
    - libpwquality-devel
    - libselinux-devel
    - libsepol-devel
    - libuuid-devel
    - ncurses-devel
    - openldap2-devel
    - patch
    - patchutils
    - pcre2-devel
    - qrencode-devel
    - tpm2-0-tss-devel
    - zlib-devel

 - name: "@MinimalCDevelopment"
   description: |
     This defines the set of packages that have to be present in order
     to install the average -devel package.
   sourceproject: Workbench
   requires:
    - "@WorkbenchRuntime"
    - "@GCC"
    # some -devel packages require info when installed; usually through gettext but sometimes directly
    - "@Texinfo"
    - "@Guile" # for autogen
    - "@PythonCore" # for cmake-mini
   binaries:
    # llvm15 requires libtool
