autoflavors:
 - name: python
   requires:
    - "@Python"
   packages:
    - python3-*
    - python39-*
    - python310-*
    - python311-*
 - name: devel
   # make sure that packages that end with *-devel are
   # recognized by this filter with a higher priority than
   # any prefix match.
   priority: 4
   packages:
    - "*-devel"
    - "*-devel-static"
    - "*-devel-extra"
    - "*-devel-doc"
 - name: ruby
   requires:
    - "@Ruby"
   packages:
    - ruby-*
 - name: typelib
   packages:
    - typelib-*
 - name: accounts
   priority: 9
   # these shouldn't really end up in a different multibuild flavor
   packages:
    - system-user-*
 - name: doc
   priority: 4
   packages:
    - "*-doc"
    - "*-docs"

build_configs:
 - name: Core/standard
   buildrequires:
    - "@BaseBuildEnv"

build_groups:
 - name: "Core"
   buildrequires:
    - "@BaseBuildEnv"
 - name: "KernelPlus"
   buildrequires:
    - "@Core"
 - name: "PerlCore"
   buildrequires:
    - "@Core"
 - name: Databases
   buildrequires:
    - "@Core"
 - name: BaseBuildEnv
   requires:
    - "@GCC"
    - "@BaseDevTools"
 - name: Systemd
 - name: Python
 - name: Apache
 - name: X11

groups:
 - name: "@32bit"
   priority: 0
   packages:
    - "*-32bit"
    - "*-32bit-*"

 - name: "@GccRuntime"
   sourceproject: GCC
   packages:
    - libgcc_s1
    - libstdc++6
    - libgomp1
   buildflavors:
    - name: devel
      binaries:
       # not sure why this isn't picked up automatically
       # FIXME
       - libstdc++-devel

 - name: "@GCC"
   sourceproject: GCC
   requires:
    - "@GccRuntime"
   packages:
    - gcc*
    - binutils
    - ccache
    - debugedit
    - dejagnu
    - dwz
   buildflavors:
    - name: devel
      packages:
       - libstdc++6-devel-gcc13
       - gcc13-devel

