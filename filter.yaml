autoflavors:
 - name: python
   requires:
    - "@Python"
   packages:
    - python3-*
    - python39-*
    - python310-*
    - python311-*
 - name: devel
   # make sure that packages that end with *-devel are
   # recognized by this filter with a higher priority than
   # any prefix match.
   priority: 4
   autoselect: no
   packages:
    - "*-devel"
    - "*-devel-static"
    - "*-devel-extra"
    - "*-devel-doc"
 - name: ruby
   requires:
    - "@Ruby"
   packages:
    - ruby-*
 - name: typelib
   # we want typelib packages to be merged into the package group of
   # the library they apply to, rather than into a new +typelib flavor
   disposition: merge
   packages:
    - typelib-*
 - name: accounts
   priority: 9
   # these shouldn't really end up in a different multibuild flavor
   packages:
    - system-user-*
 - name: doc
   priority: 4
   autoselect: no
   packages:
    - "*-doc"
    - "*-docs"
    - "*-docs-html"
 - name: x86-64-v3
   priority: 4
   autoselect: no
   packages:
    - "*-x86-64-v3"
 - name: 32bit
   disposition: ignore
   priority: 0
   packages:
    - "*-32bit"
    - "*-32bit-*"

