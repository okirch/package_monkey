 - name: "@KernelCore"
   description: |
     This provides some nearly ubiquitous kernel utilities occasionally
     used in non-kernel applications.
   buildconfig: KernelPlus/standard
   requires:
    - "@Core0"
    - "@PerlCore"
    - "@KernelLibraries"
   buildrequires:
    - "@WorkbenchEssentials"
   binaries:
    - suse-module-tools
    - kmod
    - sg3_utils
    - hwdata
    - pciutils
    - fuse3
    - arm-trusted-firmware-tools
   buildflavors:
    # lvm2 is not really a proper Kernel package because it wants a lot
