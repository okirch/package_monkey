groups:
 - name: "@GccRuntime"
   buildconfig: GCC/standard
   requires:
    - "@Glibc"
   binaries:
    - libgcc_s1
    - libstdc++6
    - libgomp1
    - libgfortran5
    - libatomic1
    - libquadmath0
    - libubsan1
    - libgmp10
    - libgmpxx4

 - name: "@GCC"
   buildconfig: GCC/standard
   requires:
    - "@GlibcDevel"
    - "@MinimalCRuntime"
    - "@Core0"
   binaries:
    - gcc*
    - binutils
    - ccache
    - debugedit
    - gmp
    - dwz
    - isl
    - gmp-devel
    - libstdc++-devel
    - libstdc++6-devel-gcc13

 - name: "@GCCDevel"
   buildconfig: GCC/standard
   requires:
    - "@GCC"
    - "@CoreAPI"
   binaries:
    - binutils-devel

 - name: "@GccCross"
   buildconfig: GCC/standard
   requires:
    - "@GCC"
    - "@LLVM"
   binaries:
    - cross-*
    - cross-*-newlib13-devel

 - name: GccDevel
   buildconfig: GCC/standard
   requires:
    - "@GCC"
   binaries:
    - gcc13-devel
    - cross-amdgcn-gcc13
    - cross-nvptx-gcc13

 - name: "@LLVMRuntime"
   buildconfig: LLVM/standard
   requires:
    - "@CoreLibraries"
   binaries:
    - libLLVM1?
    - libLTO1?
    - libomp1?
    - libclang1?
    - libclang1?-cpp*
    - libc++1
    - libc++abi1

 - name: "@LLVM"
   buildconfig: LLVM/standard
   requires:
    - "@MinimalCRuntime"
    - "@Core0"
    - "@SystemPython"
   binaries:
    - llvm
    - clang
    - llvm1?
    - llvm1?-polly
    - lldb
#   - liblldb1?

 - name: WorkbenchDevel
   binaries:

 - name: "@Testing"
   buildconfig: Workbench/standard
   requires:
    - "@MinimalCRuntime"
    - "@Core"

 - name: "@BaseDevTools"
   buildconfig: Workbench/standard
   requires:
    - "@WorkbenchCore"
    - "@PythonStandard"
    - "@Texinfo" # for info
   binaries:
    - bison
    - net-tools-deprecated
    - datefudge
    - gnu-efi
    # do these really belong here?
    - cscope
    - ctags
    - unifdef
    - cppunit
   buildflavors:
    - name: systemd
      augments:
       - "@SystemdLibraries"
      binaries:
#      - python31?-psutil

 - name: "@Ocaml"
   buildconfig: Workbench/standard
   requires:
    - "@Core"
    - "@CoreAPI"
   binaries:
    - ocaml
    # unfortunately, ocaml-runtime requires ocaml, so we need to lump these all together into one topic
    - ocaml-runtime
    - ocaml-rpm-macros
    - ocaml-*
    - ocaml-ocamldoc           purpose=devel
    - ocaml-dune               purpose=devel
    - ocaml-dune-devel         purpose=devel
   buildflavors:
    - name: x11
      requires:
       - "@X11Libraries"
      binaries:
       - ocaml-graphics

 - name: "@CoreConfig"
   buildconfig: Core/standard
   buildrequires:
    - "@WorkbenchEssentials"

 - name: "@Glibc"
   buildconfig: Core/standard
   # when deciding where to place -devel packages for a set of packages spread across
   # several labels (eg glibc here, nscd in Core0), we want this label to win
   buildrequires:
    - "@KernelHeaders"
   gravity: 100
   binaries:
    - glibc
    - glibc-locale
    - libcrypt1
    - filesystem
    - compat-usrmerge-tools
    - system-user-root

 # This label exists because we need to hide the fact that somewhat oddly,
 # Glibc sits below gcc runtime
 - name: "@MinimalCRuntime"
   buildconfig: Core/standard
   requires:
    - "@Glibc"
    - "@GccRuntime"

 - name: "@GlibcDevel"
   buildconfig: Core/standard
   requires:
    - "@Core0"
   binaries:
    - glibc-devel
    - libxcrypt-devel
    - linux-glibc-devel
    - pkgconf
    - pkgconf-m4
    - pkgconf-pkg-config
    - cross-*-glibc-devel priority=3

 - name: "@WorkbenchRuntime"
   buildconfig: Workbench/standard
   requires:
    - "@MinimalCRuntime"
   binaries:
    - libltdl7
    - gettext-runtime-mini

 - name: CoreDevel
   requires:
    - "@GlibcDevel"
    - "@Glib2API"
    - "@CoreAPI"
    - "@SystemdAPI"
   binaries:
    - rpm-build
    - compat-usrmerge-build
#   - libbz2-devel
    - libelf-devel
    - libbsd-devel
    - libxml2-devel
    - libcom_err-devel
    - fftw3-devel priority=0
    - flex
    - patch
    - patchutils
    # misnamed package (should have been static-devel)
    - newt-static
    - libgpgme-devel priority=0
    - libatomic_ops-devel

 - name: "@Boost"
   buildconfig: CorePlus/standard
   description: |
     Standard build of boost. 
     Currently, this has to live in Core because it's required by snapper.
     However, if we move snapper to CorePlus, we could probably move Boost
     as well
   requires:
    - "@PlusLibraries"
   packages:
    - boost:base
    - boost-defaults
   binaries: 
    # place one libboost rpm here explicitly. There's still something wrong with the
    # label hierarchy, because if I don't do this, the libboost_* packages from
    # boost:base will not be placed at all.
    # This seems to be an issue with boost-license1 being required by something that
    # doesn't have @Boost in its list of requirements
    - libboost_thread1_82_0

 - name: "@FFTW3"
   buildconfig: Core/standard
   description: |
     Standard build of the fftw3 library.  Could possibly live in CorePlus just as well.
     The only problem with this placement right now is that this also buils fftw3-mpi-devel,
     which depends on openmpi4-devel from HPC (for whatever reasons).
   requires:
    - "@CoreLibraries"
   packages:
    - fftw3:standard
   binaries:
#   - fftw3-mpi-devel hide

 - name: "@CoreAPI"
   buildconfig: Core/standard
   description: |
     This label exists to maintain a cycle-free dependency graph for
     devel packages. Some packages in CoreDevel depend on glib2-devel,
     which lives in @Glib2API. glib2-devel in turn requires some packages
     from CoreDevel - so we move these into @CoreAPI to straighten
     things out.
   requires:
    - "@MinimalCDevelopment"
    - "@GlibcDevel"
    - "@GCC"
   binaries:
    - libblkid-devel
    - libffi-devel
    - libidn2-devel
    - libmount-devel
    - libpwquality-devel
    - libselinux-devel
    - libsepol-devel
    - ncurses-devel
    - pcre2-devel
    - qrencode-devel
    - tpm2-0-tss-devel
    - zlib-devel
    - libcurl-devel
    - libjson-c-devel
    - libopenssl-devel
    - libuuid-devel
    - freetype2-devel
    - libbz2-devel
    - libbrotli-devel
    - libexpat-devel
    - python310-devel
    - python311-devel
    - gdbm-devel
    - openldap2-devel

 - name: "@MinimalCDevelopment"
   description: |
     This defines the set of packages that have to be present in order
     to install the average -devel package.
   buildconfig: Workbench/standard
   requires:
    - "@WorkbenchRuntime"
    - "@GCC"
    # some -devel packages require info when installed; usually through gettext but sometimes directly
    - "@Texinfo"
    - "@Guile" # for autogen
    - "@PythonCore" # for cmake-mini
   binaries:
    # llvm15 requires libtool
    - libtool
    - automake
    - autoconf
    - autoconf213
    - autoconf-archive
    - autogen
    # libssh-devel requires cmake
    - cmake
    - make
    - gettext-tools-mini
    - gettext-tools
    - nasm
   buildflavors:
    - name: qt
      requires:
       - "@Qt"
      binaries:
       - cmake-gui

 # NOTE: This currently includes a lot of LLVM bits, which should probably be separated
 # the way GCC is
 - name: "@CoreLibraries"
   # when deciding where to place -devel packages for a set of packages spread across
   # several labels (eg libbz2 here, bzip2 in Core0), we want this label to win
   gravity: 90
   buildconfig: Core/standard
   requires:
    - "@CoreConfig"
    - "@MinimalCRuntime"
    - "@WorkbenchRuntime"
   buildrequires:
    - "@WorkbenchEssentials"
   packages:
